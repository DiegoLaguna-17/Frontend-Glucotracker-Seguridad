<div class="wrap">
  <h1>Pacientes activos</h1>

  <input class="search" type="search" placeholder="Buscar paciente por nombre, id..." [value]="q()"
    (input)="q.set($any($event.target).value)" />

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        @for (p of pacientesFiltrados(); track p.id) {
        <tr>
          <td>{{ p.id }}</td>
          <td>{{ p.nombre }}</td>
          <td>{{p.estado?'Activo':'Inactivo'}}</td>
          <td>
            <button class="btn" type="button" (click)="verPaciente(p)">Ver Detalle</button>
          </td>
        </tr>
        } @empty {
        <tr>
          <td colspan="3" style="text-align: center; padding: 20px;">
            No se encontraron pacientes con ese criterio.
          </td>
        </tr>
        }
      </tbody>
    </table>
  </div>
</div>
