<div class="gestion-wrap">
  
  <div class="header-section">
    <h1>Gestion de roles</h1>
    <div class="action-buttons">
     <button class="btn-guardar" [disabled]="!hayCambios() || loadingGuardar()" (click)="guardarCambios()">
        {{ loadingGuardar() ? 'Guardando...' : 'Guardar cambios' }}
      </button>
      <button class="btn-agregar" (click)="abrirModal()">
        Agregar rol
      </button>
    </div>
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th class="col-rol">Rol</th>
          <th class="col-permisos">Permisos y Accesos</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let rol of roles()">
          <td class="cell-rol">
            <strong>{{ rol.nombre_rol | uppercase }}</strong>
          </td>
          
          <td class="cell-permisos">
            <div class="checkbox-grid">
              
              <label class="check-item" *ngFor="let permiso of permisosDisponibles()">
                <input type="checkbox" 
                       [checked]="hasPermiso(rol.id_rol, permiso.id_permiso)"
                       (change)="togglePermiso(rol.id_rol, permiso.id_permiso, $event)">
                <span class="custom-checkbox"></span>
                <span class="label-text">{{ permiso.nombre }}</span>
              </label>

            </div>
          </td>
        </tr>
      </tbody>
    </table>
    <div class="table-footer-accent"></div>
  </div>

  <div class="modal-backdrop" *ngIf="mostrarModal()" (click)="cerrarModal()"></div>
  <div class="alert-modal" *ngIf="mostrarModal()">
    <button class="close" (click)="cerrarModal()">✕</button>
    <h2 class="ttl">Nuevo Rol <span>administrativo</span></h2>
    <div class="form-group">
      <label class="lbl">Nombre del perfil:</label>
      <input type="text" class="input-estilizado" [(ngModel)]="nuevoRolNombre" placeholder="Ej: AUDITOR">
    </div>
    <button class="btn-confirmar" (click)="confirmarAgregarRol()" [disabled]="!nuevoRolNombre.trim()">
      Crear Rol
    </button>
  </div>
<!-- Modal de Éxito -->
  <div class="modal-backdrop modal-alerta-bg" *ngIf="showSuccessModal()" (click)="cerrarModalAlerta()"></div>
  <div class="modal-alerta modal-alerta--success" *ngIf="showSuccessModal()">
    <div class="alerta-icon-wrapper success-bg">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
        <polyline points="22 4 12 14.01 9 11.01"></polyline>
      </svg>
    </div>
    <h3 class="alerta-title">¡Operación Exitosa!</h3>
    <p class="alerta-message">{{ modalMessage() }}</p>
  </div>

  <!-- Modal de Error -->
  <div class="modal-backdrop modal-alerta-bg" *ngIf="showErrorModal()"></div>
  <div class="modal-alerta modal-alerta--error" *ngIf="showErrorModal()">
    <button class="close-alerta" (click)="cerrarModalAlerta()">✕</button>
    <div class="alerta-icon-wrapper error-bg">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
    </div>
    <h3 class="alerta-title">Ha ocurrido un error</h3>
    <p class="alerta-message">{{ modalMessage() }}</p>
    <button class="btn-entendido" (click)="cerrarModalAlerta()">Entendido</button>
  </div>
</div>
